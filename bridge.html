<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>溶接検査記録入力</title>
  <style>
    body { font-family: sans-serif; padding: 18px; }
    a.btn {
      display:inline-block; padding:14px 18px; margin:10px 0;
      background:#0067b8; color:#fff; text-decoration:none; border-radius:8px;
      width: 100%; max-width: 420px; text-align:center; font-size:18px;
    }
    .note { color:#444; }
    .meta { margin: 10px 0 18px; padding: 10px 12px; background:#f3f3f3; border-radius:8px; }
    code { background:#eee; padding:2px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <h2>溶接検査記録入力</h2>
  <p class="note">このページはQRから開いてください。慣れるまでは工事番号・ブロック番号は触らないでください。</p>

  <div class="meta">
    工事番号: <code id="p"></code><br/>
    ブロック番号: <code id="b"></code>
  </div>

  <a id="btnPre"  class="btn" href="#">事前入力（溶接前）</a><br/>
  <a id="btnWeld" class="btn" href="#">溶接時入力</a>
  <a id="btnApps" class="btn" href="#">Power Apps（ブロック一覧・一括更新）</a>

  <script>
    // ▼ あなたが貼ってくれたURL（&amp; は & に戻すこと）
    const PRE_TEMPLATE =
      "https://forms.office.com/Pages/ResponsePage.aspx?id=lJ6VWniifUarM9WZCadbrfRgC3Czd_JEmdVyNcQJO-xUQk40MUhPR003OUVaRVdOVjNYNEtJNFg4Ni4u&r78ff8c3b59724015a083cdb7a1c0a7bf=AAA&r161911a0ec2d45039f55e8900cc5997b=BBB";

    const WELD_TEMPLATE =
      "https://forms.office.com/Pages/ResponsePage.aspx?id=lJ6VWniifUarM9WZCadbrfRgC3Czd_JEmdVyNcQJO-xUMTFNTTBJRUJNQVVQTzU0VjVFUEtPSDZEQS4u&r19f502feb4a14656a51e8d04327414a4=AAA&r36edc9b51de049eba731b62fbe30caff=BBB";

    const APPS_TEMPLATE =
      "https://apps.powerapps.com/play/e/default-5a959e94-a278-467d-ab33-d59909a75bad/a/b264bbf7-fba7-4d95-b833-f86562fd4bb2?tenantId=5a959e94-a278-467d-ab33-d59909a75bad&hint=6c463890-40aa-4058-ab6f-6ffe57e68b03&sourcetime=1772460114013&project=AAA&block=BBB";
    
    // ▼ QRの例： .../bridge.html?project=7EMEY008&block=12
    const params = new URLSearchParams(location.search);    
    const project = params.get("project") || "";
    const block   = params.get("block")   || "";


    // 表示（任意）   
    document.getElementById("p").textContent = project || "(未指定)";
    document.getElementById("b").textContent = block   || "(未指定)";

    // 値はURLエンコードして差し替え
    const p = encodeURIComponent(project);
    const b = encodeURIComponent(block);

    function build(urlTemplate){
      // AAA/BBB をプレースホルダとして置換
      return urlTemplate.replaceAll("AAA", p).replaceAll("BBB", b);
    }

    // ボタンにセット
    document.getElementById("btnPre").href  = build(PRE_TEMPLATE);
    document.getElementById("btnWeld").href = build(WELD_TEMPLATE);
    document.getElementById("btnApps").href = build(APPS_TEMPLATE);
  </script>
</body>

</html>
